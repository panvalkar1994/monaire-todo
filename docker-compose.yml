services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: todos
      MYSQL_USER: todo
      MYSQL_PASSWORD: todo
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      MONAIRE_DATABASE_DSN: "todo:todo@tcp(mysql:3306)/todos?parseTime=true"
      MONAIRE_SERVER_GIN_MODE: "release"
    depends_on:
      mysql:
        condition: service_healthy
    command: ["server"]

volumes:
  mysql_data:
